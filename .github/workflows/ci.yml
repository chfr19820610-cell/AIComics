name: CI

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'remotion_assets/**'
  pull_request:
    branches: [main, master]

env:
  PYTHONPATH: /app/src:/app

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    defaults:
      run:
        working-directory: ./10_System

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            10_System/pyproject.toml
            10_System/requirements-lock.txt

      - name: Install dependencies
        working-directory: ./10_System
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --constraint requirements-lock.txt \
            -e ".[web,validation]" \
            pytest pytest-cov

      - name: Run tests
        working-directory: ./10_System
        run: |
          python -m pytest tests/ -x -q --tb=short

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker build -t aicomic-system:ci -f 10_System/Dockerfile 10_System/
          docker build -t aicomic-comfyui-sidecar:ci -f 10_System/Dockerfile.comfyui-sidecar 10_System/

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements-lock.txt
      - name: Run tests
        run: PYTHONPATH=src pytest tests/ -v -q
      - name: Check imports
        run: PYTHONPATH=src python -c "from aicomic.cli.main import main; print('Imports OK')"
